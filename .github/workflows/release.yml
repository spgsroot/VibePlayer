name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Заменили команды сборки на стандартные
      - name: Build AAB and APK
        run: ./gradlew bundleRelease assembleRelease

      - name: Sign AAB for Google Play
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          # Обновили путь до папки AAB
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK for RuStore & GitHub
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          # Обновили путь до папки APK
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
