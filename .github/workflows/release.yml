name: Build and Release

on:
  push:
    tags:
      - 'v*'          # автоматический запуск при пуше тега v1.0.0, v1.0.1 и т.п.
  workflow_dispatch: # ручной запуск кнопкой Run workflow

permissions:
  contents: write     # даём GITHUB_TOKEN право создавать релизы и загружать файлы

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAB and APK
        run: ./gradlew bundleRelease assembleRelease

      - name: Sign AAB for Google Play
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Sign APK for RuStore & GitHub
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Всегда загружаем подписанные файлы как артефакты,
      # чтобы ты мог скачать их даже без GitHub Release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 7

      - name: Upload Release to GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
